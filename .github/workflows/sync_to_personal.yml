name: Sync to ArielShadrac Personal Repo

on:
  push:
    branches:
      - main  

jobs:
  mirror_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to ArielShadrac Profile
        run: |
          git config --global user.name "Ariel Shadrac"
          git config --global user.email "arielshadrac@gmail.com"
          
          # On nettoie l'ancienne config si elle existe
          git remote remove mirror || true
          
          # L'URL corrigée avec ton pseudo et ton repo
          git remote add mirror "https://x-access-token:${{ secrets.SYNC_TOKEN }}@://github.com"
          
          # On pousse vers ton compte perso
          git push mirror main --force
