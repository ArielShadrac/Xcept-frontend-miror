name: Sync to ArielShadrac Personal Repo

on:
  push:
    branches:
      - main  

jobs:
  mirror_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to ArielShadrac Profile
        run: |
          git config --global user.name "Ariel Shadrac"
          git config --global user.email "arielshadrac@gmail.com"
          
          # Remove existing mirror remote if it exists (to avoid conflicts)
          git remote remove mirror || true
          
          # Add correct remote URL using the secret token
          git remote add mirror "https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/ArielShadrac/Xcept-frontend.git"
          
          # Force push the main branch to the mirror remote
          git push mirror main --force
          
      - name: Sync complete
        run: echo " Successfully synced to personal repository"